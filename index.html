<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My To-Do App</title>

    <!-- CSS ko connect kar rahe hain -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">
      <h1>📝 My To-Do-List</h1>

      <div class="input-area">
        <!-- id diya taaki JS pakad sake -->
        <input type="text" id="taskInput" placeholder="Koi kaam likho..." />
        <button id="addBtn">Add Karo</button>
      </div>

      <!-- Tasks yahan add hongi -->
      <ul id="taskList"></ul>
    </div>

    <!-- JS ko connect kar rahe hain — BODY KE END MEIN -->
    <script src="app.js"></script>
  </body>
</html>
